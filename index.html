<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#f8ffff,#e9fdff,#dffcff);
overflow:hidden;
color:#3b4a5a;
}

/* FONDO */

.circle{
position:absolute;
border-radius:50%;
opacity:0.4;
z-index:-1;
}

.circle1{
width:280px;
height:280px;
background:#c8f8ff;
top:-100px;
left:-100px;
}

.circle2{
width:240px;
height:240px;
background:#dffcff;
bottom:-80px;
right:-80px;
}

.circle3{
width:160px;
height:160px;
background:#bff6ff;
top:60%;
left:70%;
}

/* MENU */

#mainMenu{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.menuBox{
width:100%;
max-width:320px;
background:rgba(255,255,255,0.92);
border-radius:35px;
padding:24px 18px;
text-align:center;
position:relative;
overflow:hidden;
border:2px solid #dffcff;
box-shadow:0px 8px 25px rgba(0,0,0,0.06);
}

.menuDecoration{
position:absolute;
width:180px;
height:180px;
background:#c8f8ff;
border-radius:50%;
top:-80px;
right:-70px;
opacity:0.5;
}

.menuDecoration2{
position:absolute;
width:140px;
height:140px;
background:#dffcff;
border-radius:50%;
bottom:-70px;
left:-60px;
opacity:0.5;
}

/* ROBOT */

.robotBox{
width:150px;
height:120px;
background:#dffcff;
border-radius:30px;
margin:auto;
margin-bottom:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
}

/* TITULO */

.menuBox h1{
font-size:48px;
color:#69dceb;
margin-bottom:8px;
font-weight:900;
}

.menuBox p{
font-size:15px;
color:#6f8396;
margin-bottom:22px;
line-height:1.4;
}

/* INPUT */

#playerName{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
margin-bottom:14px;
outline:none;
text-align:center;
background:white;
color:#4f6275;
border:2px solid #d9f9ff;
}

/* BOTONES */

.menuBtn{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#c8f8ff,#e9fdff);
color:#4f6275;
font-size:17px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.menuBtn:hover{
transform:scale(1.02);
}

/* CREDITOS */

.credits{
margin-top:20px;
font-size:13px;
color:#7d8fa3;
}

/* QUIZ */

#quizScreen{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
padding:15px;
}

#gameContainer{
width:100%;
max-width:360px;
background:rgba(255,255,255,0.92);
border-radius:30px;
padding:22px;
box-shadow:0px 10px 30px rgba(0,0,0,0.06);
}

/* TOP */

#topBar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
gap:10px;
}

.infoBox{
background:#f4fdff;
padding:12px;
border-radius:15px;
font-size:14px;
color:#5d7186;
width:100%;
text-align:center;
}

/* BARRA */

#progressBar{
width:100%;
height:14px;
background:#ecf9fc;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#9befff,#d9fbff);
transition:0.4s;
}

/* PREGUNTA */

#question{
font-size:22px;
text-align:center;
margin-bottom:22px;
color:#4f6275;
}

/* RESPUESTAS */

.answerBtn{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:18px;
background:white;
color:#4f6275;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0px 4px 10px rgba(0,0,0,0.04);
}

.answerBtn:hover{
background:#f2fcff;
}

.correct{
background:#b9ffd2 !important;
}

.wrong{
background:#ffd3d3 !important;
}

/* BOTONES */

#continueBtn,
#menuBtn2{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:18px;
background:#b8f5ff;
color:#3b4a5a;
font-size:17px;
cursor:pointer;
font-weight:bold;
}

/* FINAL */

#finalScreen{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.finalBox{
width:100%;
max-width:320px;
background:rgba(255,255,255,0.92);
border-radius:35px;
padding:30px 20px;
text-align:center;
}

.finalBox h1{
font-size:42px;
color:#64d8eb;
margin-bottom:15px;
}

.finalBox p{
margin-top:10px;
color:#7b8ca0;
font-size:18px;
}

.character{
font-size:70px;
margin-bottom:20px;
}

/* CLASIFICACION */

#leaderboardScreen{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.leaderboardBox{
width:100%;
max-width:330px;
background:white;
border-radius:30px;
padding:25px;
text-align:center;
}

.leaderboardBox h2{
font-size:30px;
margin-bottom:20px;
color:#69dceb;
}

.playerRow{
display:flex;
justify-content:space-between;
padding:12px;
background:#f4fdff;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<!-- MENU -->

<div id="mainMenu">

<div class="menuBox">

<div class="menuDecoration"></div>
<div class="menuDecoration2"></div>

<div class="robotBox">
🤖
</div>

<h1>MISIÓN IA</h1>

<p>
Aprende jugando sobre patrones de crianza ✨
</p>

<input type="text" id="playerName" placeholder="👤 Escribe tu nombre">

<button class="menuBtn" onclick="startGame()">
▶️ Jugar
</button>

<button class="menuBtn" onclick="showInstructions()">
📖 Instrucciones
</button>

<button class="menuBtn" onclick="showLeaderboard()">
🏆 Clasificación
</button>

<div class="credits">
Creado por Lucia Carolina Barcenas 💙
</div>

</div>

</div>

<!-- QUIZ -->

<div id="quizScreen">

<div id="gameContainer">

<div id="topBar">

<div class="infoBox">
⭐ <span id="points">0</span> pts
</div>

<div class="infoBox">
📚 <span id="currentQuestion">1</span>/<span id="totalQuestions">5</span>
</div>

</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn">
Continuar →
</button>

<button id="menuBtn2" onclick="goToMenu()">
🏠 Menú
</button>

</div>

</div>

<!-- FINAL -->

<div id="finalScreen">

<div class="finalBox">

<div class="character">🏆</div>

<h1>¡COMPLETADO!</h1>

<h2 id="finalPoints"></h2>

<p>
Terminaste el reto educativo 😎
</p>

<button class="menuBtn" onclick="restartGame()">
🔄 Jugar otra vez
</button>

<button class="menuBtn" onclick="goToMenu()">
🏠 Menú principal
</button>

</div>

</div>

<!-- CLASIFICACION -->

<div id="leaderboardScreen">

<div class="leaderboardBox">

<h2>🏆 Clasificación</h2>

<div id="leaderboardList">

<div class="playerRow">
<span>Jugador</span>
<span>0 pts</span>
</div>

</div>

<button class="menuBtn" onclick="goToMenu()">
🏠 Volver
</button>

</div>

</div>

<script>

const questions = [

{
question:"¿Qué caracteriza al patrón democrático?",
answers:[
{text:"La comunicación y respeto",correct:true},
{text:"El castigo excesivo",correct:false},
{text:"La falta de reglas",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay pocas reglas",correct:true},
{text:"Existe disciplina extrema",correct:false},
{text:"Hay castigos fuertes",correct:false}
]
},

{
question:"¿Qué mejora una buena crianza?",
answers:[
{text:"La violencia",correct:false},
{text:"La autoestima",correct:true},
{text:"El miedo",correct:false}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Miedo",correct:false},
{text:"Confianza y comunicación",correct:true},
{text:"Desinterés",correct:false}
]
},

{
question:"¿Qué crianza suele ser muy estricta?",
answers:[
{text:"Permisiva",correct:false},
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false}
]
}

];

let current = 0;
let points = 0;

document.getElementById("totalQuestions").innerHTML =
questions.length;

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

const j = Math.floor(Math.random() * (i + 1));

[array[i], array[j]] = [array[j], array[i]];

}

}

function startGame(){

const name = document.getElementById("playerName").value;

if(name.trim() == ""){
alert("Escribe tu nombre");
return;
}

document.getElementById("mainMenu").style.display =
"none";

document.getElementById("quizScreen").style.display =
"flex";

current = 0;
points = 0;

document.getElementById("points").innerHTML = points;

loadQuestion();

}

function showInstructions(){

alert("Responde correctamente para ganar puntos ⭐");

}

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML =
q.question;

document.getElementById("currentQuestion").innerHTML =
current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display =
"none";

shuffle(q.answers);

q.answers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

}else{

button.classList.add("wrong");

}

document.getElementById("points").innerHTML =
points;

document.getElementById("continueBtn").style.display =
"block";

}

document.getElementById("continueBtn").onclick = ()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

function finishGame(){

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"flex";

document.getElementById("finalPoints").innerHTML =
"⭐ Puntuación final: " + points;

saveScore();

}

function restartGame(){

document.getElementById("finalScreen").style.display =
"none";

startGame();

}

function goToMenu(){

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"none";

document.getElementById("leaderboardScreen").style.display =
"none";

document.getElementById("mainMenu").style.display =
"flex";

}

function saveScore(){

const name = document.getElementById("playerName").value;

let leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

leaderboard.push({
name:name,
score:points
});

leaderboard.sort((a,b)=>b.score-a.score);

leaderboard = leaderboard.slice(0,10);

localStorage.setItem(
"leaderboard",
JSON.stringify(leaderboard)
);

}

function showLeaderboard(){

document.getElementById("mainMenu").style.display =
"none";

document.getElementById("leaderboardScreen").style.display =
"flex";

const leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

const list =
document.getElementById("leaderboardList");

list.innerHTML = "";

leaderboard.forEach(player=>{

list.innerHTML += `

<div class="playerRow">
<span>${player.name}</span>
<span>${player.score} pts</span>
</div>

`;

});

}

</script>

</body>
</html>
