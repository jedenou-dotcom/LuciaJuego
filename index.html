<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>MISIÓN IA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:#eefdff;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#4c6277;
}

/* FONDO */

.bg{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(173,240,255,0.35);
}

.c1{
width:300px;
height:300px;
top:-80px;
left:-100px;
}

.c2{
width:250px;
height:250px;
bottom:-90px;
right:-80px;
}

.c3{
width:180px;
height:180px;
top:40%;
right:-50px;
}

/* PANTALLAS */

.screen{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.hidden{
display:none;
}

/* TARJETA */

.card{
width:100%;
max-width:390px;
background:rgba(255,255,255,0.82);
backdrop-filter:blur(14px);
border-radius:38px;
padding:28px 22px;
box-shadow:0 10px 35px rgba(0,0,0,0.08);
text-align:center;
position:relative;
overflow:hidden;
}

.topShape{
position:absolute;
width:180px;
height:180px;
background:#dff9ff;
border-radius:50%;
top:-70px;
right:-60px;
}

/* ROBOT */

.robotBox{
width:130px;
height:130px;
background:#dff9ff;
border-radius:35px;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
margin-bottom:18px;
font-size:65px;
}

/* TITULOS */

h1{
font-size:55px;
font-weight:700;
color:#5ad3e7;
line-height:1;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:#6e8197;
margin-bottom:28px;
}

/* INPUT */

.inputBox{
width:100%;
height:62px;
border:2px solid #444;
border-radius:20px;
display:flex;
align-items:center;
padding:0 20px;
font-size:18px;
background:white;
margin-bottom:18px;
}

.inputBox input{
border:none;
outline:none;
width:100%;
font-size:18px;
font-family:'Poppins',sans-serif;
color:#54697f;
background:transparent;
}

/* BOTONES */

.menuBtn{
width:100%;
height:62px;
border:none;
border-radius:20px;
margin-top:14px;
font-size:22px;
font-weight:600;
background:#d5f7ff;
color:#52677d;
cursor:pointer;
transition:0.2s;
}

.menuBtn:active{
transform:scale(0.97);
}

/* CREDITOS */

.credits{
margin-top:18px;
background:white;
border-radius:22px;
padding:18px;
border:2px solid #eefcff;
}

.credits h3{
font-size:22px;
margin-bottom:8px;
color:#5ad3e7;
}

.credits p{
font-size:18px;
line-height:1.5;
}

/* QUIZ */

#question{
font-size:30px;
font-weight:600;
margin-bottom:25px;
color:#42586f;
}

.topInfo{
display:flex;
justify-content:space-between;
margin-bottom:20px;
gap:10px;
}

.info{
flex:1;
background:white;
padding:12px;
border-radius:18px;
font-size:18px;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.progressBar{
width:100%;
height:15px;
background:#e6f9ff;
border-radius:30px;
overflow:hidden;
margin-bottom:25px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#6de7ff,#9ff1ff);
transition:0.4s;
}

.answerBtn{
width:100%;
min-height:68px;
border:none;
border-radius:20px;
margin-top:14px;
background:white;
font-size:20px;
font-weight:500;
color:#475d73;
padding:10px;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
}

.answerBtn:active{
transform:scale(0.97);
}

.correct{
background:#cbffd9 !important;
}

.wrong{
background:#ffd6d6 !important;
}

#continueBtn{
display:none;
background:#65def5;
color:white;
font-size:22px;
font-weight:700;
}

/* TABLA */

.leaderTitle{
font-size:46px;
font-weight:700;
color:#59d4e8;
margin-bottom:8px;
}

.leaderSub{
font-size:18px;
margin-bottom:20px;
}

.table{
width:100%;
background:white;
border-radius:22px;
overflow:hidden;
}

.row{
display:flex;
justify-content:space-between;
padding:16px 18px;
border-bottom:1px solid #edf7fb;
font-size:18px;
font-weight:600;
}

.row:nth-child(1){
background:#fff7d1;
}

.row:nth-child(2){
background:#f4f4f4;
}

.row:nth-child(3){
background:#ffe6d6;
}

.backBtn{
width:100%;
height:58px;
margin-top:18px;
border:none;
border-radius:18px;
background:#d7f7ff;
font-size:20px;
font-weight:700;
}

/* FINAL */

#finalTitle{
font-size:50px;
color:#5ad3e7;
margin-bottom:12px;
}

#finalScore{
font-size:28px;
margin-bottom:25px;
font-weight:700;
}

</style>
</head>

<body>

<div class="bg">
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>
</div>

<!-- MENU -->

<div class="screen" id="menuScreen">

<div class="card">

<div class="topShape"></div>

<div class="robotBox">
🤖
</div>

<h1>MISIÓN IA</h1>

<div class="subtitle">
Aprende jugando sobre patrones de crianza ✨
</div>

<div class="inputBox">
👤
<input type="text" id="playerName" placeholder="Escribe tu nombre">
</div>

<button class="menuBtn" onclick="startGame()">
▶️ Jugar
</button>

<button class="menuBtn" onclick="showInstructions()">
📖 Instrucciones
</button>

<button class="menuBtn" onclick="showLeaderboard()">
🏆 Clasificación
</button>

<div class="credits">
<h3>⭐ Créditos</h3>
<p>
Creado por<br>
<b>Lucia Carolina Barcenas</b>
</p>
</div>

</div>

</div>

<!-- QUIZ -->

<div class="screen hidden" id="quizScreen">

<div class="card">

<div class="topInfo">

<div class="info">
⭐ <span id="points">0</span>
</div>

<div class="info">
📚 <span id="current">1</span>/<span id="total"></span>
</div>

</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div id="question"></div>

<div id="answers"></div>

<button class="menuBtn" id="continueBtn">
Continuar →
</button>

<button class="backBtn" onclick="goMenu()">
🏠 Menú
</button>

</div>

</div>

<!-- FINAL -->

<div class="screen hidden" id="finalScreen">

<div class="card">

<div style="font-size:90px;">🏆</div>

<div id="finalTitle">
¡COMPLETADO!
</div>

<div id="finalScore"></div>

<button class="menuBtn" onclick="restartGame()">
🔄 Jugar otra vez
</button>

<button class="menuBtn" onclick="goMenu()">
🏠 Menú
</button>

</div>

</div>

<!-- CLASIFICACION -->

<div class="screen hidden" id="leaderScreen">

<div class="card">

<div class="leaderTitle">
CLASIFICACIÓN
</div>

<div class="leaderSub">
🏆 Top jugadores
</div>

<div class="table" id="leaderboardTable">

<div class="row">
<span>🥇 LuciaIA</span>
<span>580 ⭐</span>
</div>

<div class="row">
<span>🥈 MateoPro</span>
<span>450 ⭐</span>
</div>

<div class="row">
<span>🥉 Sofia123</span>
<span>320 ⭐</span>
</div>

</div>

<button class="backBtn" onclick="goMenu()">
⬅️ Volver
</button>

</div>

</div>

<script>

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");
const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");
const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

const questions = [

{
question:"¿Qué caracteriza al patrón de crianza democrático?",
answers:[
{text:"Comunicación y respeto",correct:true},
{text:"Castigos severos",correct:false},
{text:"Falta de límites",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay muchas reglas",correct:false},
{text:"Pocas reglas y límites",correct:true},
{text:"Castigos estrictos",correct:false}
]
},

{
question:"¿Qué mejora una buena crianza?",
answers:[
{text:"La violencia",correct:false},
{text:"El miedo",correct:false},
{text:"La autoestima",correct:true}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Miedo",correct:false},
{text:"Desinterés",correct:false},
{text:"Confianza y comunicación",correct:true}
]
},

{
question:"¿Qué crianza suele ser muy estricta?",
answers:[
{text:"Permisiva",correct:false},
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false}
]
}

];

let current = 0;
let points = 0;

document.getElementById("total").innerHTML = questions.length;

function startGame(){

const player = document.getElementById("playerName").value.trim();

if(player === ""){
alert("Escribe tu nombre");
return;
}

clickSound.play();

document.getElementById("menuScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

loadQuestion();

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML = q.question;

document.getElementById("current").innerHTML = current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display = "none";

const mixedAnswers = shuffle([...q.answers]);

mixedAnswers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

clickSound.play();

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

wrongSound.play();

}

document.getElementById("points").innerHTML = points;

document.getElementById("continueBtn").style.display = "block";

}

document.getElementById("continueBtn").onclick = ()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

function finishGame(){

document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("finalScreen").classList.remove("hidden");

document.getElementById("finalScore").innerHTML =
"⭐ Puntaje final: " + points;

saveScore();

}

function restartGame(){

current = 0;
points = 0;

document.getElementById("points").innerHTML = "0";

document.getElementById("finalScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

loadQuestion();

}

function goMenu(){

clickSound.play();

document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("finalScreen").classList.add("hidden");
document.getElementById("leaderScreen").classList.add("hidden");

document.getElementById("menuScreen").classList.remove("hidden");

current = 0;
points = 0;

document.getElementById("points").innerHTML = "0";

document.getElementById("progress").style.width = "0%";

}

function showInstructions(){

alert("Responde correctamente las preguntas para ganar puntos ⭐");

}

function showLeaderboard(){

clickSound.play();

document.getElementById("menuScreen").classList.add("hidden");
document.getElementById("leaderScreen").classList.remove("hidden");

loadLeaderboard();

}

function saveScore(){

const player =
document.getElementById("playerName").value;

let scores =
JSON.parse(localStorage.getItem("scores")) || [];

scores.push({
name:player,
points:points
});

scores.sort((a,b)=>b.points-a.points);

scores = scores.slice(0,10);

localStorage.setItem("scores",JSON.stringify(scores));

}

function loadLeaderboard(){

const table =
document.getElementById("leaderboardTable");

let scores =
JSON.parse(localStorage.getItem("scores")) || [];

table.innerHTML = "";

if(scores.length === 0){

table.innerHTML = `
<div class="row">
<span>Sin jugadores aún</span>
<span>⭐</span>
</div>
`;

return;

}

scores.forEach((player,index)=>{

let medal = (index+1);

if(index===0) medal="🥇";
if(index===1) medal="🥈";
if(index===2) medal="🥉";

table.innerHTML += `

<div class="row">
<span>${medal} ${player.name}</span>
<span>${player.points} ⭐</span>
</div>

`;

});

}

</script>

</body>
</html>
