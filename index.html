<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#f8ffff,#e9fdff,#dffcff);
overflow-x:hidden;
color:#3b4a5a;
}

/* FONDOS */

.circle{
position:absolute;
border-radius:50%;
opacity:0.4;
z-index:-1;
}

.circle1{
width:350px;
height:350px;
background:#c8f8ff;
top:-120px;
left:-120px;
}

.circle2{
width:280px;
height:280px;
background:#dffcff;
bottom:-100px;
right:-100px;
}

.circle3{
width:200px;
height:200px;
background:#bff6ff;
top:55%;
left:70%;
}

/* ESTRELLAS */

.star{
position:absolute;
color:white;
font-size:28px;
animation:float 3s infinite ease-in-out;
}

.star1{
top:10%;
left:15%;
}

.star2{
top:18%;
right:20%;
}

.star3{
bottom:15%;
left:25%;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* MENU */

#mainMenu,
#quizScreen,
#finalScreen{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#quizScreen,
#finalScreen{
display:none;
}

.menuBox,
#gameContainer,
.finalBox{
width:100%;
max-width:760px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border-radius:35px;
padding:40px;
box-shadow:0px 10px 40px rgba(0,0,0,0.08);
}

/* MENU */

.menuDecoration{
position:absolute;
width:250px;
height:250px;
background:#c8f8ff;
border-radius:50%;
top:-100px;
right:-80px;
opacity:0.6;
}

.menuBox{
position:relative;
overflow:hidden;
text-align:center;
}

.robotFace{
width:140px;
height:140px;
background:#dffcff;
border-radius:35px;
margin:auto;
margin-bottom:25px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
animation:float 3s infinite ease-in-out;
}

.eye{
width:22px;
height:22px;
background:#69dceb;
border-radius:50%;
box-shadow:0px 0px 15px #69dceb;
}

.menuBox h1{
font-size:60px;
color:#69dceb;
margin-bottom:10px;
}

.menuBox p{
font-size:22px;
color:#6f8396;
margin-bottom:20px;
}

/* BOTONES */

.menuBtn,
.answerBtn,
#continueBtn,
#menuBtn{
width:100%;
padding:18px;
margin-top:15px;
border:none;
border-radius:18px;
font-size:19px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.menuBtn{
background:linear-gradient(135deg,#c8f8ff,#e9fdff);
color:#4f6275;
}

.menuBtn:hover{
transform:translateY(-3px);
background:linear-gradient(135deg,#b6f4ff,#ddfbff);
}

.answerBtn{
background:white;
color:#4f6275;
box-shadow:0px 4px 10px rgba(0,0,0,0.04);
}

.answerBtn:hover{
background:#f2fcff;
transform:translateY(-2px);
}

#continueBtn,
#menuBtn{
background:#b8f5ff;
color:#3b4a5a;
}

#continueBtn:hover,
#menuBtn:hover{
background:#9befff;
transform:scale(1.02);
}

/* TOP */

#topBar{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.infoBox{
background:#f4fdff;
padding:14px 22px;
border-radius:18px;
font-size:18px;
color:#5d7186;
box-shadow:0px 4px 10px rgba(0,0,0,0.03);
}

/* BARRA */

#progressBar{
width:100%;
height:18px;
background:#ecf9fc;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#9befff,#d9fbff);
transition:0.4s;
}

/* QUESTION */

#questionBox{
background:#f8feff;
border-radius:25px;
padding:30px;
}

#question{
font-size:30px;
text-align:center;
color:#4f6275;
margin-bottom:30px;
}

.correct{
background:#b9ffd2 !important;
}

.wrong{
background:#ffd3d3 !important;
}

.finalBox{
text-align:center;
}

.finalBox h1{
font-size:55px;
color:#64d8eb;
}

.character{
font-size:80px;
margin-bottom:20px;
animation:float 3s infinite ease-in-out;
}

#leaderboard{
margin-top:20px;
}

#leaderboard p{
margin-top:10px;
font-size:20px;
color:#5d7186;
}

@media(max-width:700px){

.menuBox h1{
font-size:40px;
}

#question{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="star star1">✦</div>
<div class="star star2">✦</div>
<div class="star star3">✦</div>

<!-- MENU -->

<div id="mainMenu">

<div class="menuBox">

<div class="menuDecoration"></div>

<div class="robotFace">
<div class="eye"></div>
<div class="eye"></div>
</div>

<h1>MISIÓN IA</h1>

<p>
Aprende sobre patrones de crianza jugando ✨
</p>

<input
id="playerName"
type="text"
placeholder="👤 Escribe tu nombre"
class="menuBtn"
style="
background:white;
text-align:center;
cursor:text;
"
/>

<button class="menuBtn" onclick="startGame()">
▶️ Jugar
</button>

<button class="menuBtn" onclick="showInstructions()">
📖 Instrucciones
</button>

</div>

</div>

<!-- JUEGO -->

<div id="quizScreen">

<div id="gameContainer">

<div id="topBar">

<div class="infoBox">
⭐ Puntos: <span id="points">0</span>
</div>

<div class="infoBox">
❤️ <span id="lives">3</span>
</div>

<div class="infoBox">
📚 <span id="currentQuestion">1</span>/<span id="totalQuestions">5</span>
</div>

</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox">

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn">
Continuar →
</button>

<button id="menuBtn" onclick="goToMenu()">
🏠 Volver al menú
</button>

</div>

</div>

</div>

<!-- FINAL -->

<div id="finalScreen">

<div class="finalBox">

<div class="character">🏆</div>

<h1>¡COMPLETADO!</h1>

<h2 id="finalPoints"></h2>

<div id="leaderboard"></div>

<button class="menuBtn" onclick="restartGame()">
🔄 Jugar otra vez
</button>

<button class="menuBtn" onclick="goToMenu()">
🏠 Menú principal
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCxdfOV3wv26INwjB9hXZDuIL_Q-SEv0UI",
authDomain: "juego-lucy.firebaseapp.com",
projectId: "juego-lucy",
storageBucket: "juego-lucy.firebasestorage.app",
messagingSenderId: "634003549609",
appId: "1:634003549609:web:b000c14d0dd620e06e28b8",
measurementId: "G-22PXLHBPDC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");

const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

let current = 0;
let points = 0;
let lives = 3;
let playerName = "";

const questions = [

{
question:"¿Qué caracteriza al patrón de crianza democrático?",
answers:[
{text:"La comunicación y el respeto",correct:true},
{text:"El castigo excesivo",correct:false},
{text:"La falta de reglas",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay pocas reglas y límites",correct:true},
{text:"Hay castigos estrictos",correct:false},
{text:"Existe mucha disciplina",correct:false}
]
},

{
question:"¿Qué mejora una buena crianza?",
answers:[
{text:"La autoestima",correct:true},
{text:"La violencia",correct:false},
{text:"El miedo",correct:false}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Confianza y comunicación",correct:true},
{text:"Desinterés",correct:false},
{text:"Miedo",correct:false}
]
},

{
question:"¿Qué crianza suele ser muy estricta?",
answers:[
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false},
{text:"Permisiva",correct:false}
]
}

];

document.getElementById("totalQuestions").innerHTML =
questions.length;

function showInstructions(){

alert("Responde correctamente las preguntas para ganar puntos ⭐");

}

window.startGame = function(){

playerName =
document.getElementById("playerName").value.trim();

if(playerName === ""){

alert("Escribe tu nombre");

return;

}

clickSound.play();

document.getElementById("mainMenu").style.display =
"none";

document.getElementById("quizScreen").style.display =
"flex";

loadQuestion();

}

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML =
q.question;

document.getElementById("currentQuestion").innerHTML =
current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display =
"none";

q.answers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

clickSound.play();

const buttons =
document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

lives--;

document.getElementById("lives").innerHTML =
lives;

wrongSound.play();

if(lives <= 0){

setTimeout(()=>{

gameOver();

},800);

}

}

document.getElementById("points").innerHTML =
points;

document.getElementById("continueBtn").style.display =
"block";

}

document.getElementById("continueBtn").onclick =
()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

async function saveScore(){

await addDoc(
collection(db,"scores"),
{
name: playerName,
points: points
}
);

}

async function loadLeaderboard(){

const q = query(
collection(db,"scores"),
orderBy("points","desc"),
limit(10)
);

const querySnapshot =
await getDocs(q);

let html =
"<h2>🏆 TOP 10</h2>";

let pos = 1;

querySnapshot.forEach((doc)=>{

const data = doc.data();

html += `
<p>
${pos}. ${data.name} - ⭐ ${data.points}
</p>
`;

pos++;

});

document.getElementById(
"leaderboard"
).innerHTML = html;

}

function gameOver(){

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"flex";

document.getElementById("finalPoints").innerHTML =
`
💀 GAME OVER
<br><br>
👤 ${playerName}
<br><br>
⭐ ${points} puntos
`;

loadLeaderboard();

}

async function finishGame(){

await saveScore();

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"flex";

let rank = "🥉 Aprendiz";

if(points >= 30)
rank = "🥈 Experto";

if(points >= 50)
rank = "🥇 Maestro IA";

document.getElementById("finalPoints").innerHTML =
`
👤 ${playerName}
<br><br>
⭐ ${points} puntos
<br><br>
${rank}
`;

loadLeaderboard();

}

window.restartGame = function(){

current = 0;
points = 0;
lives = 3;

document.getElementById("points").innerHTML =
points;

document.getElementById("lives").innerHTML =
lives;

document.getElementById("finalScreen").style.display =
"none";

document.getElementById("quizScreen").style.display =
"flex";

loadQuestion();

}

window.goToMenu = function(){

clickSound.play();

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"none";

document.getElementById("mainMenu").style.display =
"flex";

current = 0;
points = 0;
lives = 3;

document.getElementById("points").innerHTML =
points;

document.getElementById("lives").innerHTML =
lives;

document.getElementById("progress").style.width =
"0%";

}

</script>

</body>
</html>
