<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f0f,#111827,#001f3f);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameBox{
    width:700px;
    background:#111827;
    border-radius:25px;
    padding:30px;
    box-shadow:0px 0px 30px cyan;
    text-align:center;
}

h1{
    color:cyan;
    margin-bottom:10px;
}

#progressText{
    margin-top:10px;
    color:#bdbdbd;
}

#progressBar{
    width:100%;
    height:20px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

#progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,cyan,#00ff88);
    transition:0.5s;
}

#question{
    font-size:28px;
    margin-top:40px;
    min-height:80px;
}

.answerBtn{
    display:block;
    width:100%;
    background:#1e293b;
    border:none;
    color:white;
    padding:18px;
    margin-top:15px;
    border-radius:15px;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.answerBtn:hover{
    transform:scale(1.02);
    background:#334155;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

#continueBtn{
    margin-top:25px;
    padding:15px 30px;
    background:cyan;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    display:none;
}

#continueBtn:hover{
    background:#00aaff;
}

#score{
    font-size:22px;
    color:yellow;
    margin-top:15px;
}

#finalScreen{
    display:none;
}

</style>
</head>

<body>

<div id="gameBox">

<div id="quizScreen">

<h1>🤖 MISIÓN IA</h1>

<div id="score">
Puntos: <span id="points">0</span>
</div>

<div id="progressText">
Pregunta <span id="currentQuestion">1</span> de <span id="totalQuestions">5</span>
</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn" onclick="nextQuestion()">
Continuar →
</button>

</div>

<div id="finalScreen">

<h1>🏆 ¡MISIÓN COMPLETADA!</h1>

<h2 id="finalScore"></h2>

<p>Has salvado el sistema educativo usando IA correctamente 😎</p>

<button onclick="restartGame()">
Jugar otra vez
</button>

</div>

</div>

<script>

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");
const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");
const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

let current = 0;
let points = 0;

const questions = [

{
question:"¿Qué significa IA?",
answers:[
{text:"Inteligencia Artificial",correct:true},
{text:"Internet Automático",correct:false},
{text:"Información Avanzada",correct:false}
]
},

{
question:"¿Cuál es una buena forma de usar IA?",
answers:[
{text:"Aprender y estudiar",correct:true},
{text:"Copiar tareas",correct:false},
{text:"Hacer trampa",correct:false}
]
},

{
question:"¿Qué es plagio?",
answers:[
{text:"Copiar trabajo ajeno",correct:true},
{text:"Investigar",correct:false},
{text:"Trabajar en equipo",correct:false}
]
},

{
question:"¿Qué herramienta usa IA?",
answers:[
{text:"ChatGPT",correct:true},
{text:"Linterna",correct:false},
{text:"Calculadora básica",correct:false}
]
},

{
question:"¿Qué ayuda más a aprender?",
answers:[
{text:"Comprender y practicar",correct:true},
{text:"Copiar respuestas",correct:false},
{text:"Memorizar sin entender",correct:false}
]
}

];

document.getElementById("totalQuestions").innerHTML = questions.length;

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML = q.question;

document.getElementById("currentQuestion").innerHTML = current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display = "none";

q.answers.forEach(answer => {

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = () => selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

clickSound.play();

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn => {
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

wrongSound.play();

}

document.getElementById("points").innerHTML = points;

document.getElementById("continueBtn").style.display = "inline-block";

}

function nextQuestion(){

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

}

function finishGame(){

document.getElementById("quizScreen").style.display = "none";

document.getElementById("finalScreen").style.display = "block";

document.getElementById("finalScore").innerHTML =
"Tu puntuación final fue: " + points;

document.getElementById("progress").style.width = "100%";

}

function restartGame(){

current = 0;

points = 0;

document.getElementById("points").innerHTML = points;

document.getElementById("quizScreen").style.display = "block";

document.getElementById("finalScreen").style.display = "none";

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
