<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    overflow:hidden;
}

/* FONDO */

.backgroundGlow{
    position:absolute;
    width:300px;
    height:300px;
    background:cyan;
    filter:blur(150px);
    opacity:0.15;
    z-index:-1;
}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-100px;
    right:-100px;
}

/* MENU PRINCIPAL */

#mainMenu{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menuBox{
    width:700px;
    background:rgba(15,23,42,0.95);
    border:2px solid cyan;
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0px 0px 40px rgba(0,255,255,0.5);
}

.menuBox h1{
    font-size:60px;
    color:cyan;
}

.menuBox p{
    margin-top:20px;
    color:#cbd5e1;
    font-size:20px;
}

.menuBtn{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    background:cyan;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.menuBtn:hover{
    background:#00aaff;
    transform:scale(1.02);
}

/* PANTALLA DEL JUEGO */

#quizScreen{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
}

#gameContainer{
    width:750px;
    background: rgba(15,23,42,0.95);
    border:2px solid cyan;
    border-radius:30px;
    padding:35px;
    box-shadow:0px 0px 40px rgba(0,255,255,0.5);
}

#topBar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.infoBox{
    background:#1e293b;
    padding:12px 20px;
    border-radius:15px;
    font-size:18px;
}

#progressBar{
    width:100%;
    height:18px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

#progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ffff,#00ff88);
    transition:0.5s;
}

#questionBox{
    background:#0f172a;
    padding:30px;
    border-radius:20px;
}

#question{
    font-size:28px;
    text-align:center;
    margin-bottom:30px;
}

.answerBtn{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.answerBtn:hover{
    background:#334155;
    transform:scale(1.02);
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

#continueBtn{
    width:100%;
    padding:18px;
    margin-top:25px;
    border:none;
    border-radius:15px;
    background:cyan;
    font-size:20px;
    cursor:pointer;
    display:none;
    font-weight:bold;
}

#continueBtn:hover{
    background:#00aaff;
}

/* PANTALLA FINAL */

#finalScreen{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.finalBox{
    width:700px;
    background:rgba(15,23,42,0.95);
    border:2px solid cyan;
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0px 0px 40px rgba(0,255,255,0.5);
}

.finalBox h1{
    font-size:55px;
    color:cyan;
}

.finalBox p{
    margin-top:20px;
    font-size:22px;
}

</style>
</head>

<body>

<div class="backgroundGlow glow1"></div>
<div class="backgroundGlow glow2"></div>

<!-- MENU -->

<div id="mainMenu">

<div class="menuBox">

<h1>🤖 MISIÓN IA</h1>

<p>
Juego educativo sobre patrones de crianza
</p>

<button class="menuBtn" onclick="startGame()">
▶️ JUGAR
</button>

<button class="menuBtn" onclick="showInstructions()">
📖 INSTRUCCIONES
</button>

</div>

</div>

<!-- JUEGO -->

<div id="quizScreen">

<div id="gameContainer">

<div id="topBar">

<div class="infoBox">
⭐ Puntos: <span id="points">0</span>
</div>

<div class="infoBox">
📚 <span id="currentQuestion">1</span>/<span id="totalQuestions">5</span>
</div>

</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox">

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn">
Continuar →
</button>

</div>

</div>

</div>

<!-- FINAL -->

<div id="finalScreen">

<div class="finalBox">

<h1>🏆 ¡COMPLETADO!</h1>

<h2 id="finalPoints"></h2>

<p>
Terminaste el desafío educativo 😎
</p>

<button class="menuBtn" onclick="restartGame()">
🔄 JUGAR OTRA VEZ
</button>

</div>

</div>

<script>

/* SONIDOS */

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");

const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

/* VARIABLES */

let current = 0;
let points = 0;

/* PREGUNTAS */

const questions = [

{
question:"¿Qué caracteriza al patrón de crianza democrático?",
answers:[
{text:"La comunicación y el respeto",correct:true},
{text:"El castigo excesivo",correct:false},
{text:"La falta de reglas",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay pocas reglas",correct:true},
{text:"Hay castigos estrictos",correct:false},
{text:"Existe mucha disciplina",correct:false}
]
},

{
question:"¿Qué mejora una buena crianza?",
answers:[
{text:"La autoestima",correct:true},
{text:"La violencia",correct:false},
{text:"El miedo",correct:false}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Confianza y comunicación",correct:true},
{text:"Desinterés",correct:false},
{text:"Miedo",correct:false}
]
},

{
question:"¿Qué crianza suele ser muy estricta?",
answers:[
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false},
{text:"Permisiva",correct:false}
]
}

];

document.getElementById("totalQuestions").innerHTML =
questions.length;

/* MENU */

function startGame(){

clickSound.play();

document.getElementById("mainMenu").style.display = "none";

document.getElementById("quizScreen").style.display = "flex";

loadQuestion();

}

function showInstructions(){

alert(
"Responde correctamente las preguntas para ganar puntos. 🎮"
);

}

/* CARGAR PREGUNTA */

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML =
q.question;

document.getElementById("currentQuestion").innerHTML =
current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display =
"none";

q.answers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

/* RESPUESTAS */

function selectAnswer(button,correct){

clickSound.play();

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

wrongSound.play();

}

document.getElementById("points").innerHTML =
points;

document.getElementById("continueBtn").style.display =
"block";

}

/* CONTINUAR */

document.getElementById("continueBtn").onclick = ()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

/* FINAL */

function finishGame(){

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"flex";

document.getElementById("finalPoints").innerHTML =
"⭐ Puntuación final: " + points;

document.getElementById("progress").style.width = "100%";

}

/* REINICIAR */

function restartGame(){

current = 0;
points = 0;

document.getElementById("points").innerHTML = points;

document.getElementById("finalScreen").style.display =
"none";

document.getElementById("quizScreen").style.display =
"flex";

loadQuestion();

}

</script>

</body>
</html>
