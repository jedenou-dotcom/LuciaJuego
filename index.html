<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg,#f8ffff,#dffcff,#eefcff);
    overflow:hidden;
    color:#3b4a5a;
}

/* FONDOS DECORATIVOS */

.circle{
    position:absolute;
    border-radius:50%;
    opacity:0.4;
    z-index:-1;
}

.circle1{
    width:300px;
    height:300px;
    background:#b8f5ff;
    top:-100px;
    left:-100px;
}

.circle2{
    width:250px;
    height:250px;
    background:#dffcff;
    bottom:-80px;
    right:-80px;
}

.circle3{
    width:180px;
    height:180px;
    background:#c9f7ff;
    top:50%;
    left:70%;
}

/* ESTRELLAS */

.star{
    position:absolute;
    color:white;
    font-size:25px;
    animation: float 3s infinite ease-in-out;
}

.star1{
    top:10%;
    left:15%;
}

.star2{
    top:20%;
    right:18%;
}

.star3{
    bottom:15%;
    left:25%;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* MENU */

#mainMenu{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menuBox{
    width:750px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(12px);
    border-radius:35px;
    padding:45px;
    text-align:center;
    box-shadow:0px 10px 40px rgba(0,0,0,0.08);
    border:2px solid #dffcff;
}

.logo{
    font-size:90px;
    margin-bottom:15px;
    animation: float 4s infinite ease-in-out;
}

.menuBox h1{
    font-size:60px;
    color:#64d8eb;
}

.menuBox p{
    margin-top:15px;
    color:#7b8ca0;
    font-size:22px;
}

.menuBtn{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:18px;
    background:#b8f5ff;
    color:#3b4a5a;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.menuBtn:hover{
    transform:scale(1.03);
    background:#9befff;
}

/* PANTALLA DEL JUEGO */

#quizScreen{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
}

#gameContainer{
    width:760px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(15px);
    border-radius:35px;
    padding:35px;
    box-shadow:0px 10px 40px rgba(0,0,0,0.08);
}

/* TOP */

#topBar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.infoBox{
    background:#f4fdff;
    padding:14px 22px;
    border-radius:18px;
    font-size:18px;
    color:#5d7186;
    box-shadow:0px 4px 10px rgba(0,0,0,0.03);
}

/* BARRA */

#progressBar{
    width:100%;
    height:18px;
    background:#ecf9fc;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

#progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#9befff,#d9fbff);
    transition:0.4s;
}

/* PREGUNTAS */

#questionBox{
    background:#f8feff;
    border-radius:25px;
    padding:30px;
}

#question{
    font-size:30px;
    text-align:center;
    color:#4f6275;
    margin-bottom:30px;
}

.answerBtn{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:18px;
    background:white;
    color:#4f6275;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0px 4px 10px rgba(0,0,0,0.04);
}

.answerBtn:hover{
    transform:translateY(-2px);
    background:#f2fcff;
}

.correct{
    background:#b9ffd2 !important;
}

.wrong{
    background:#ffd3d3 !important;
}

#continueBtn{
    width:100%;
    padding:18px;
    margin-top:25px;
    border:none;
    border-radius:18px;
    background:#b8f5ff;
    color:#3b4a5a;
    font-size:20px;
    cursor:pointer;
    display:none;
    font-weight:bold;
}

#continueBtn:hover{
    background:#9befff;
}

/* FINAL */

#finalScreen{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.finalBox{
    width:700px;
    background:rgba(255,255,255,0.85);
    border-radius:35px;
    padding:40px;
    text-align:center;
    box-shadow:0px 10px 40px rgba(0,0,0,0.08);
}

.finalBox h1{
    font-size:55px;
    color:#64d8eb;
}

.finalBox p{
    margin-top:15px;
    color:#7b8ca0;
    font-size:22px;
}

.character{
    font-size:80px;
    margin-bottom:20px;
    animation: float 3s infinite ease-in-out;
}

</style>
</head>

<body>

<!-- FIGURAS -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="star star1">✦</div>
<div class="star star2">✦</div>
<div class="star star3">✦</div>

<!-- MENU -->

<div id="mainMenu">

<div class="menuBox">

<div class="logo">🤖</div>

<h1>MISIÓN IA</h1>

<p>
Aprende sobre patrones de crianza jugando ✨
</p>

<button class="menuBtn" onclick="startGame()">
▶️ Jugar
</button>

<button class="menuBtn" onclick="showInstructions()">
📖 Instrucciones
</button>

</div>

</div>

<!-- JUEGO -->

<div id="quizScreen">

<div id="gameContainer">

<div id="topBar">

<div class="infoBox">
⭐ Puntos: <span id="points">0</span>
</div>

<div class="infoBox">
📚 <span id="currentQuestion">1</span>/<span id="totalQuestions">5</span>
</div>

</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox">

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn">
Continuar →
</button>

</div>

</div>

</div>

<!-- FINAL -->

<div id="finalScreen">

<div class="finalBox">

<div class="character">🏆</div>

<h1>¡COMPLETADO!</h1>

<h2 id="finalPoints"></h2>

<p>
Terminaste el reto educativo 😎
</p>

<button class="menuBtn" onclick="restartGame()">
🔄 Jugar otra vez
</button>

</div>

</div>

<script>

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");

const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

let current = 0;
let points = 0;

const questions = [

{
question:"¿Qué caracteriza al patrón de crianza democrático?",
answers:[
{text:"La comunicación y el respeto",correct:true},
{text:"El castigo excesivo",correct:false},
{text:"La falta de reglas",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay pocas reglas y límites",correct:true},
{text:"Hay castigos estrictos",correct:false},
{text:"Existe mucha disciplina",correct:false}
]
},

{
question:"¿Qué mejora una buena crianza?",
answers:[
{text:"La autoestima",correct:true},
{text:"La violencia",correct:false},
{text:"El miedo",correct:false}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Confianza y comunicación",correct:true},
{text:"Desinterés",correct:false},
{text:"Miedo",correct:false}
]
},

{
question:"¿Qué crianza suele ser muy estricta?",
answers:[
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false},
{text:"Permisiva",correct:false}
]
}

];

document.getElementById("totalQuestions").innerHTML =
questions.length;

function startGame(){

clickSound.play();

document.getElementById("mainMenu").style.display = "none";

document.getElementById("quizScreen").style.display = "flex";

loadQuestion();

}

function showInstructions(){

alert("Responde correctamente las preguntas para ganar puntos ⭐");

}

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML = q.question;

document.getElementById("currentQuestion").innerHTML =
current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display =
"none";

q.answers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

clickSound.play();

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

wrongSound.play();

}

document.getElementById("points").innerHTML = points;

document.getElementById("continueBtn").style.display =
"block";

}

document.getElementById("continueBtn").onclick = ()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

function finishGame(){

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("finalScreen").style.display =
"flex";

document.getElementById("finalPoints").innerHTML =
"⭐ Puntuación final: " + points;

}

function restartGame(){

current = 0;
points = 0;

document.getElementById("points").innerHTML = points;

document.getElementById("finalScreen").style.display =
"none";

document.getElementById("quizScreen").style.display =
"flex";

loadQuestion();

}

</script>

</body>
</html>
