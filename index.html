<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISIÓN IA - Patrones de Crianza</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#gameContainer{
    width:750px;
    background: rgba(15,23,42,0.95);
    border:2px solid cyan;
    border-radius:30px;
    padding:35px;
    box-shadow:0px 0px 40px rgba(0,255,255,0.5);
    position:relative;
}

h1{
    text-align:center;
    color:cyan;
    margin-bottom:10px;
    font-size:40px;
}

#subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

#topBar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.infoBox{
    background:#1e293b;
    padding:12px 20px;
    border-radius:15px;
    font-size:18px;
}

#progressBar{
    width:100%;
    height:18px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

#progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ffff,#00ff88);
    transition:0.5s;
}

#questionBox{
    background:#0f172a;
    padding:30px;
    border-radius:20px;
    min-height:150px;
}

#question{
    font-size:28px;
    text-align:center;
    margin-bottom:30px;
}

.answerBtn{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.answerBtn:hover{
    transform:scale(1.02);
    background:#334155;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

#continueBtn{
    margin-top:30px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:cyan;
    color:black;
    font-size:20px;
    cursor:pointer;
    display:none;
    font-weight:bold;
}

#continueBtn:hover{
    background:#00aaff;
}

#finalScreen{
    display:none;
    text-align:center;
}

#finalScreen h2{
    font-size:45px;
    color:cyan;
    margin-bottom:20px;
}

#finalScreen p{
    font-size:22px;
    margin-top:20px;
}

#restartBtn{
    margin-top:30px;
    padding:18px 30px;
    border:none;
    border-radius:15px;
    background:cyan;
    font-size:20px;
    cursor:pointer;
}

.glow{
    position:absolute;
    width:200px;
    height:200px;
    background:cyan;
    filter:blur(120px);
    opacity:0.15;
    z-index:-1;
}

.glow1{
    top:-50px;
    left:-50px;
}

.glow2{
    bottom:-50px;
    right:-50px;
}

</style>
</head>

<body>

<div id="gameContainer">

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div id="quizScreen">

<h1>🧠 PATRONES DE CRIANZA</h1>
<p id="subtitle">
Juego educativo interactivo
</p>

<div id="topBar">

<div class="infoBox">
⭐ Puntos: <span id="points">0</span>
</div>

<div class="infoBox">
📚 Pregunta <span id="currentQuestion">1</span>/<span id="totalQuestions">5</span>
</div>

</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox">

<h2 id="question"></h2>

<div id="answers"></div>

<button id="continueBtn">
Continuar →
</button>

</div>

</div>

<div id="finalScreen">

<h2>🏆 ¡COMPLETADO!</h2>

<h3 id="finalPoints"></h3>

<p>
Has terminado el reto sobre patrones de crianza 😎
</p>

<button id="restartBtn">
Jugar otra vez
</button>

</div>

</div>

<script>

const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3");

const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

let current = 0;
let points = 0;

const questions = [

{
question:"¿Qué caracteriza al patrón de crianza democrático?",
answers:[
{text:"La comunicación y el respeto",correct:true},
{text:"El castigo excesivo",correct:false},
{text:"La falta de reglas",correct:false}
]
},

{
question:"¿Qué ocurre en una crianza permisiva?",
answers:[
{text:"Hay pocas reglas y límites",correct:true},
{text:"Hay demasiados castigos",correct:false},
{text:"Existe disciplina estricta",correct:false}
]
},

{
question:"¿Cuál es un efecto positivo de una buena crianza?",
answers:[
{text:"Mayor autoestima",correct:true},
{text:"Más violencia",correct:false},
{text:"Miedo constante",correct:false}
]
},

{
question:"¿Qué debe existir entre padres e hijos?",
answers:[
{text:"Confianza y comunicación",correct:true},
{text:"Miedo",correct:false},
{text:"Desinterés",correct:false}
]
},

{
question:"¿Qué tipo de crianza suele ser muy estricta?",
answers:[
{text:"Autoritaria",correct:true},
{text:"Democrática",correct:false},
{text:"Permisiva",correct:false}
]
}

];

document.getElementById("totalQuestions").innerHTML = questions.length;

function loadQuestion(){

const q = questions[current];

document.getElementById("question").innerHTML = q.question;

document.getElementById("currentQuestion").innerHTML = current + 1;

document.getElementById("progress").style.width =
((current)/questions.length)*100 + "%";

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

document.getElementById("continueBtn").style.display = "none";

q.answers.forEach(answer=>{

const btn = document.createElement("button");

btn.classList.add("answerBtn");

btn.innerHTML = answer.text;

btn.onclick = ()=>selectAnswer(btn,answer.correct);

answersDiv.appendChild(btn);

});

}

function selectAnswer(button,correct){

clickSound.play();

const buttons = document.querySelectorAll(".answerBtn");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(correct){

button.classList.add("correct");

points += 10;

correctSound.play();

}else{

button.classList.add("wrong");

wrongSound.play();

}

document.getElementById("points").innerHTML = points;

document.getElementById("continueBtn").style.display = "block";

}

document.getElementById("continueBtn").onclick = ()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

finishGame();

}

};

function finishGame(){

document.getElementById("quizScreen").style.display = "none";

document.getElementById("finalScreen").style.display = "block";

document.getElementById("finalPoints").innerHTML =
"⭐ Puntuación final: " + points;

document.getElementById("progress").style.width = "100%";

}

document.getElementById("restartBtn").onclick = ()=>{

current = 0;
points = 0;

document.getElementById("points").innerHTML = points;

document.getElementById("quizScreen").style.display = "block";

document.getElementById("finalScreen").style.display = "none";

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
